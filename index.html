<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Caderno Jurídico - Leitura</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c0e18;--sidebar-bg:#080a12;--card-bg:#111422;--border:#1e2338;
      --gold:#c9a84c;--gold-light:#e8c97a;--text:#dde0f0;--text-muted:#6b7299;--text-faint:#3a3f5c;
    }
    body{font-family:'Lora',serif;background:var(--bg);color:var(--text);line-height:1.6;height:100vh;display:flex;overflow:hidden}
    
    /* SIDEBAR - EXATAMENTE IGUAL À SUA FOTO */
    #sidebar{width:290px;min-width:290px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
    .sidebar-header{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
    .sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a6230);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .logo-text{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text)}
    .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-faint);padding:6px 20px;margin-top:8px}

    .cat-row{display:flex;align-items:center;gap:8px;padding:11px 20px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
    .cat-row:hover{background:rgba(255,255,255,.025)}
    .cat-row.open{background:rgba(255,255,255,.018)}
    .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .cat-label{flex:1;font-size:14px;color:var(--text);font-weight:600}
    .cat-chevron{font-size:11px;color:var(--text-faint);transition:transform .2s}
    .cat-row.open .cat-chevron{transform:rotate(90deg)}

    .sub-group{display:none}
    .sub-group.open{display:block}
    .sub-row{display:flex;align-items:center;gap:8px;padding:9px 20px 9px 38px;cursor:pointer;transition:all .15s}
    .sub-row:hover{background:rgba(255,255,255,.03)}
    .sub-row.active{background:var(--card-bg);border-left:3px solid var(--gold)}
    .sub-icon{font-size:11px;color:var(--text-faint)}
    .sub-label{flex:1;font-size:13px;color:var(--text-muted)}
    .sub-row.active .sub-label{color:var(--gold-light)}
    .sub-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);background:#1a1f36;padding:1px 6px;border-radius:8px}

    .topbar{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:12px}
    #content{flex:1;overflow-y:auto;padding:20px}
    .note-card{background:#111422;border:1px solid #1e2338;border-radius:12px;padding:18px;cursor:pointer;transition:all .2s}
    .note-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.5)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:99999}
    .modal-content{background:#111422;width:92%;max-width:640px;border-radius:16px;padding:24px;max-height:88vh;overflow-y:auto}
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">⚖️</div>
        <div>
          <div class="logo-text">Caderno Jurídico</div>
          <div style="font-size:10px;color:#6b7299;letter-spacing:1px">MODO LEITURA • Firebase</div>
        </div>
      </div>
    </div>
    <div id="sidebarTree" style="flex:1;overflow-y:auto"></div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar">
      <button onclick="toggleMobileSidebar()" style="font-size:29px;background:none;border:none;color:var(--text)">☰</button>
      <div style="flex:1">
        <h1 id="mainTitle" style="font-family:'Playfair Display',serif;font-size:23px;color:#e8c97a;margin:0">Caderno Jurídico</h1>
        <div id="breadcrumb" style="font-size:12.5px;color:#6b7299">Selecione uma matéria</div>
      </div>
      <button onclick="openReviewMode()" style="padding:10px 20px;background:#111422;border:1px solid #1e2338;border-radius:10px;color:var(--text);font-size:14.5px">📖 Revisar</button>
    </div>

    <div id="content">
      <div id="emptyState" style="text-align:center;color:#6b7299;margin-top:100px;font-size:15px">Carregando dados do Firebase...</div>
      <div id="notesArea" style="display:none">
        <div id="notesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px"></div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: atob('QUl6YVN5REpCZEs5SS1qdGc5dWpUYzlYc3hyLWhuUGZrSWQ0d0lV'),
      authDomain: atob('cGR2MS03NzYzMi5maXJlYmFzZWFwcC5jb20='),
      databaseURL: atob('aHR0cHM6Ly9wZHYxLTc3NjMyLWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=='),
      projectId: atob('cGR2MS03NzYzMg=='),
      storageBucket: atob('cGR2MS03NzYzMi5maXJlYmFzZXN0b3JhZ2UuYXBw'),
      messagingSenderId: atob('MjQ2MDMzNzkxMTE3'),
      appId: atob('MToyNDYwMzM3OTExMTc6d2ViOjdiNzBiNTExZWE4ZDhjNWJhMWNhYzQ='),
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ROOT = 'caderno_estudos';

    let data = {};
    let activeCat = null;
    let activeSub = null;
    let currentNotesList = [];
    let currentNoteIndex = 0;
    let reviewNotes = [];
    let reviewIdx = 0;

    function init() {
      // AVISO PARA ARQUIVO LOCAL
      if (location.protocol === 'file:') {
        setTimeout(() => {
          const warn = document.createElement('div');
          warn.style = 'position:fixed;bottom:15px;left:15px;right:15px;background:#c9a84c;color:#111422;padding:12px 16px;border-radius:12px;font-size:13px;z-index:99999;box-shadow:0 4px 15px rgba(0,0,0,.6);text-align:center';
          warn.innerHTML = '⚠️ <strong>Abra pelo editor online</strong> ou use Chrome com servidor local.<br>Firebase não funciona bem em arquivo local.';
          document.body.appendChild(warn);
        }, 1500);
      }

      db.ref(ROOT).on('value', snap => {
        data = snap.val() || {};
        renderSidebar();
        document.getElementById('emptyState').innerHTML = `<p style="margin-top:100px">Selecione uma matéria e assunto na barra lateral</p>`;
      }, err => {
        console.error(err);
        document.getElementById('emptyState').innerHTML = `<p style="color:#e05c6a">Erro ao conectar com Firebase.<br>Tente abrir pelo editor online.</p>`;
      });
    }

    function renderSidebar() {
      const tree = document.getElementById('sidebarTree');
      tree.innerHTML = `<div class="section-label">MATÉRIAS</div>`;

      Object.entries(data).forEach(([catId, cat]) => {
        const subs = cat.subcategories || {};
        let html = `
          <div class="cat-row open" onclick="toggleCat('${catId}')">
            <div class="cat-dot" style="background:${cat.color}"></div>
            <span class="cat-label">${cat.name}</span>
            <span class="cat-chevron">▶</span>
          </div>
          <div class="sub-group open" id="subs-${catId}">`;

        Object.entries(subs).forEach(([subId, sub]) => {
          const count = Object.keys(sub.notes || {}).length;
          html += `
            <div class="sub-row" onclick="selectSub('${catId}','${subId}')">
              <span class="sub-icon">📄</span>
              <span class="sub-label">${sub.name}</span>
              <span class="sub-count">${count}</span>
            </div>`;
        });
        html += `</div>`;
        tree.innerHTML += html;
      });
    }

    function toggleCat(catId) {
      const group = document.getElementById(`subs-${catId}`);
      group.classList.toggle('open');
    }

    function selectSub(catId, subId) {
      activeCat = catId;
      activeSub = subId;
      renderMain();
    }

    function renderMain() {
      const cat = data[activeCat];
      const sub = cat?.subcategories?.[activeSub];
      if (!sub) return;

      document.getElementById('mainTitle').textContent = sub.name;
      document.getElementById('breadcrumb').innerHTML = `${cat.name} › ${sub.name}`;

      currentNotesList = Object.entries(sub.notes || {}).map(([id,n]) => ({...n, id}));
      currentNoteIndex = 0;

      const grid = document.getElementById('notesGrid');
      grid.innerHTML = '';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('notesArea').style.display = 'block';

      if (!currentNotesList.length) {
        grid.innerHTML = `<p style="text-align:center;color:#6b7299;padding:80px 20px">Nenhuma anotação neste assunto.</p>`;
        return;
      }

      currentNotesList.forEach((note, i) => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <div style="font-family:'Playfair Display',serif;font-size:16.5px;margin-bottom:8px">${note.title}</div>
          <div style="font-size:13.5px;color:#6b7299;line-height:1.65;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden">
            ${(note.content || '').replace(/\n/g,' ')}
          </div>
          <div style="margin-top:14px;font-size:11px;color:#6b7299">📅 ${note.date}</div>
        `;
        card.onclick = () => { currentNoteIndex = i; openReadModal(); };
        grid.appendChild(card);
      });
    }

    function openReadModal() {
      const note = currentNotesList[currentNoteIndex];
      const content = (note.content || '').replace(/\*\*(.*?)\*\*/g, '<mark style="background:#c9a84c33;color:#e8c97a;padding:2px 5px;border-radius:4px">$1</mark>');

      document.querySelectorAll('.modal-overlay').forEach(m => m.remove());

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-content">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h2 style="font-family:'Playfair Display',serif;color:#e8c97a;font-size:23px">${note.title}</h2>
            <button onclick="closeModal()" style="background:none;border:none;font-size:32px;color:#6b7299">✕</button>
          </div>
          <div style="color:#6b7299;font-size:12.5px;margin-bottom:18px">📅 ${note.date}</div>
          <div style="font-size:15.8px;line-height:1.85;white-space:pre-wrap">${content}</div>
          <div style="margin-top:32px;display:flex;gap:10px">
            <button onclick="prevNote()" style="flex:1;padding:14px;background:#22273a;border:none;border-radius:10px;color:#dde0f0">← Anterior</button>
            <button onclick="nextNote()" style="flex:1;padding:14px;background:#c9a84c;color:#111422;border:none;border-radius:10px;font-weight:700">Próxima →</button>
          </div>
          <button onclick="closeModal()" style="margin-top:12px;width:100%;padding:14px;background:transparent;border:1px solid #6b7299;color:#6b7299;border-radius:10px">Fechar</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.remove()); }
    function nextNote() { if (currentNoteIndex < currentNotesList.length-1) { currentNoteIndex++; openReadModal(); } }
    function prevNote() { if (currentNoteIndex > 0) { currentNoteIndex--; openReadModal(); } }

    function openReviewMode() {
      if (!activeCat || !activeSub) return alert("Selecione primeiro um assunto.");
      const all = Object.entries(data[activeCat]?.subcategories?.[activeSub]?.notes || {}).map(([id,n]) => ({...n,id}));
      const imp = all.filter(n => n.important);
      reviewNotes = (imp.length ? imp : all).sort(() => Math.random() - 0.5);
      reviewIdx = 0;
      if (!reviewNotes.length) return alert("Nenhuma anotação para revisar.");
      showReviewCard();
    }

    function showReviewCard() {
      const note = reviewNotes[reviewIdx];
      const pct = Math.round(((reviewIdx + 1) / reviewNotes.length) * 100);
      const body = (note.content || '').replace(/\*\*(.*?)\*\*/g, '<mark style="background:#c9a84c33;color:#e8c97a">$1</mark>');

      closeModal();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-content">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b7299">📖 REVISÃO • ${reviewIdx+1}/${reviewNotes.length}</div>
            <button onclick="closeModal()" style="background:none;border:none;font-size:32px;color:#6b7299">✕</button>
          </div>
          <div style="height:6px;background:#1e2338;border-radius:9999px;margin-bottom:24px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#c9a84c,#e8c97a)"></div></div>
          <div style="font-family:'Playfair Display',serif;font-size:22px;color:#e8c97a;line-height:1.3;margin-bottom:20px">${note.title}</div>
          <div style="font-size:15.8px;line-height:1.85;white-space:pre-wrap">${body}</div>
          <div style="margin-top:32px;display:flex;justify-content:space-between;gap:12px">
            <button onclick="prevReview()" style="flex:1;padding:14px;background:#22273a;border:none;border-radius:10px;color:#dde0f0" ${reviewIdx===0?'disabled':''}>← Anterior</button>
            <div style="color:#6b7299;font-size:13px">${pct}% concluído</div>
            ${reviewIdx < reviewNotes.length-1 ? `<button onclick="nextReview()" style="flex:1;padding:14px;background:#c9a84c;color:#111422;border:none;border-radius:10px;font-weight:700">Próxima →</button>` : `<button onclick="finishReview()" style="flex:1;padding:14px;background:#c9a84c;color:#111422;border:none;border-radius:10px;font-weight:700">✓ Concluir Revisão</button>`}
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    function nextReview(){ reviewIdx++; showReviewCard(); }
    function prevReview(){ if(reviewIdx>0) reviewIdx--; showReviewCard(); }
    function finishReview(){ closeModal(); alert('🎉 Revisão concluída!'); }

    function toggleMobileSidebar() {
      const sb = document.getElementById('sidebar');
      sb.style.transform = sb.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
    }

    // INICIAR
    init();
  </script>
</body>
</html>
